name: Supabase keep-alive

on:
  schedule:
    - cron: "17 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping database
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://equmwyvxbjjocwetwfcw.supabase.co/rest/v1/toernooien?select=id&limit=1" -H "apikey: sb_publishable_wLF8ZNLFbiWM8YGrEnzjXQ_Aon8llxh")
          echo "Supabase antwoordde met HTTP $code"
          test "$code" = "200"
