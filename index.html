<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sjotter — jeugdtoernooien organiseren en oefenwedstrijden vinden</title>
<meta name="description" content="Sjotter — toernooien organiseren en oefenwedstrijden vinden voor jeugdvoetbal. Inschrijvingen, loting, speelschema en live standen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --groen:#14532D; --groen-d:#0D3B20; --gras:#22A05A; --gras-l:#E7F5EC;
  --inkt:#101B14; --grijs:#5B6660; --papier:#F4F6F3; --wit:#FFFFFF;
  --lijn:#DDE3DC; --geel:#F2C230; --rood:#C6402E; --rood-l:#FBEBE8;
  --blauw-d:#16233F; --blauw:#2C4F8C; --hemel:#4E86E8;
  --r:12px; --shadow:0 1px 2px rgba(16,27,20,.06),0 4px 16px rgba(16,27,20,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
html,body{overflow-x:hidden;max-width:100%}
body{font-family:'Inter',sans-serif;background:var(--papier);color:var(--inkt);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Archivo',sans-serif;letter-spacing:-.01em;line-height:1.15}
a{color:var(--groen);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--lijn);border-radius:8px;background:var(--wit);width:100%;color:var(--inkt)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gras);outline-offset:1px;border-color:var(--gras)}
label{display:block;font-size:13px;font-weight:600;color:var(--grijs);margin:14px 0 5px;text-transform:uppercase;letter-spacing:.04em}
.mono{font-family:'IBM Plex Mono',monospace}

/* ---------- layout ---------- */
.topbar{background:var(--inkt);color:#fff;position:sticky;top:0;z-index:50}
.topbar-in{max-width:1080px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:18px}
.logo{font-family:'Archivo';font-weight:900;font-size:20px;color:#fff;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo .bal{width:22px;height:22px;border-radius:50%;background:#fff;position:relative;display:inline-block}
.logo .bal::after{content:'';position:absolute;inset:6px;border-radius:2px;background:var(--inkt);clip-path:polygon(50% 0,100% 38%,81% 100%,19% 100%,0 38%)}
.topbar nav{margin-left:auto;display:flex;gap:8px;align-items:center}
.topbar nav a,.topbar nav button{color:#fff;font-weight:600;font-size:14px;padding:8px 14px;border-radius:8px;background:transparent;border:none}
.topbar nav a:hover,.topbar nav button:hover{background:rgba(255,255,255,.12)}
.wrap{max-width:1080px;margin:0 auto;padding:28px 20px 80px}
.wrap-smal{max-width:520px}

/* ---------- knoppen ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;font-weight:700;font-size:14px;padding:11px 20px;border-radius:9px;border:none;transition:.15s}
.btn-p{background:var(--gras);color:#fff}
.btn-p:hover{background:#1B8A4C}
.btn-d{background:var(--groen-d);color:#fff}
.btn-d:hover{background:#0A2E19}
.btn-o{background:var(--wit);color:var(--inkt);border:1px solid var(--lijn)}
.btn-o:hover{border-color:var(--gras);color:var(--groen)}
.btn-r{background:var(--rood-l);color:var(--rood)}
.btn-sm{padding:7px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---------- kaarten & tabellen ---------- */
.kaart{background:var(--wit);border:1px solid var(--lijn);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;margin-bottom:18px;overflow-x:auto}
.kaart h3{font-size:17px;margin-bottom:4px}
.kaart .sub{color:var(--grijs);font-size:13px}
.krijt{border:none;border-top:2px dashed var(--lijn);margin:18px 0}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--grijs);padding:8px 10px;border-bottom:2px solid var(--lijn)}
td{padding:9px 10px;border-bottom:1px solid var(--lijn);vertical-align:middle}
tr:last-child td{border-bottom:none}
td.num,th.num{text-align:center;width:42px}
.tijd{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;background:var(--gras-l);color:var(--groen);padding:3px 8px;border-radius:6px;white-space:nowrap}
.veldtag{font-size:11.5px;font-weight:700;color:var(--grijs);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.score{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;white-space:nowrap}
.score input{width:46px;text-align:center;padding:6px 4px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.badge{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em}
.b-concept{background:#EEE;color:var(--grijs)}
.b-live{background:var(--gras-l);color:var(--groen)}
.b-geel{background:#FBF3D9;color:#8A6D10}
.b-rood{background:var(--rood-l);color:var(--rood)}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:2px solid var(--lijn);margin:18px 0 22px}
.tabs a{padding:9px 14px;font-weight:600;font-size:14px;color:var(--grijs);border-radius:8px 8px 0 0;border-bottom:2px solid transparent;margin-bottom:-2px}
.tabs a.act{color:var(--groen);border-bottom-color:var(--gras);background:var(--wit)}

/* ---------- landing ---------- */
.hero{background:var(--groen-d);color:#fff;padding:70px 20px 84px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;left:50%;top:-140px;width:560px;height:560px;border:2px dashed rgba(255,255,255,.14);border-radius:50%;transform:translateX(-50%);pointer-events:none}
.hero::after{content:'';position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(255,255,255,.14);pointer-events:none}
.hero-in{max-width:820px;margin:0 auto;text-align:center;position:relative;z-index:1}
.hero h1{font-size:clamp(34px,6vw,58px);font-weight:800;letter-spacing:-.01em;word-spacing:.12em;margin-bottom:18px}
.hero h1 em{font-style:normal;color:var(--geel)}
.hero p{font-size:18px;color:#CBDCD1;max-width:560px;margin:0 auto 30px}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:26px}
.feat{background:var(--wit);border:1px solid var(--lijn);border-radius:var(--r);padding:20px}
.feat .ico{font-size:22px;margin-bottom:8px}
.feat h3{font-size:15.5px;margin-bottom:5px}
.feat p{font-size:13.5px;color:var(--grijs)}

/* ---------- poules & standen ---------- */
.poule-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.poule{border:1px solid var(--lijn);border-radius:10px;overflow:hidden}
.poule-kop{background:var(--groen-d);color:#fff;font-family:'Archivo';font-weight:800;font-size:14px;padding:8px 14px;letter-spacing:.02em}
.poule ul{list-style:none}
.poule li{padding:9px 14px;border-bottom:1px solid var(--lijn);display:flex;align-items:center;gap:8px;font-size:14px}
.poule li:last-child{border-bottom:none}
.poule li select{width:auto;padding:4px 8px;font-size:12.5px;margin-left:auto}

/* ---------- misc ---------- */
.leeg{text-align:center;color:var(--grijs);padding:34px 16px;font-size:14px}
.rij{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.rij>*{flex:1;min-width:140px}
.melding{padding:12px 16px;border-radius:9px;font-size:14px;font-weight:500;margin:14px 0}
.m-ok{background:var(--gras-l);color:var(--groen)}
.m-fout{background:var(--rood-l);color:var(--rood)}
.m-info{background:#EDF2FA;color:#2B4C7E}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--inkt);color:#fff;padding:12px 22px;border-radius:99px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:99;box-shadow:var(--shadow)}
#toast.zien{opacity:1;transform:translateX(-50%) translateY(0)}
.stat-rij{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 4px}
.stat{background:var(--wit);border:1px solid var(--lijn);border-radius:10px;padding:14px 18px;min-width:120px}
.stat .n{font-family:'Archivo';font-weight:900;font-size:24px;color:var(--groen)}
.stat .l{font-size:12px;color:var(--grijs);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.iban{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;background:var(--gras-l);color:var(--groen);padding:10px 16px;border-radius:8px;display:inline-block;margin:4px 0}

/* ---------- topbar pillen ---------- */
.topbar nav a.nav-pil,.topbar nav button.nav-pil{display:inline-flex;align-items:center;border:none;border-radius:99px;padding:8px 15px;font-weight:700;font-size:13.5px;white-space:nowrap;transition:.15s;cursor:pointer}
.topbar nav .pil-blauw{background:var(--hemel);color:#fff}
.topbar nav .pil-blauw:hover{background:#3B72D4}
.topbar nav .pil-groen{background:var(--gras);color:#fff}
.topbar nav .pil-groen:hover{background:#1B8A4C}
.topbar nav .pil-wit{background:#fff;color:var(--inkt)}
.topbar nav .pil-wit:hover{background:#E4E9E4}
.tlogo{width:20px;height:20px;border-radius:50%;object-fit:cover;vertical-align:-4px;margin-right:6px;background:#fff;border:1px solid var(--lijn)}
.sponsor-strook{display:flex;gap:26px;align-items:center;justify-content:center;flex-wrap:wrap;padding:22px;background:var(--wit);border:1px solid var(--lijn);border-radius:var(--r);margin-top:6px}
.sponsor-strook img{height:44px;max-width:150px;object-fit:contain}
.sponsor-strook .s-naam{font-weight:700;font-size:14px;color:var(--grijs)}
/* ---------- TV-modus ---------- */
.tv{position:fixed;inset:0;background:var(--groen-d);color:#fff;display:flex;flex-direction:column;z-index:80;overflow:hidden}
.tv-kop{display:flex;justify-content:space-between;align-items:center;padding:22px 40px;border-bottom:2px solid rgba(255,255,255,.15)}
.tv-kop h1{font-size:30px;font-weight:800;word-spacing:.1em}
.tv-kop .tv-klok{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600}
.tv-cat{font-family:'Archivo';font-weight:900;font-size:24px;color:var(--geel);text-transform:uppercase;letter-spacing:.06em;padding:18px 40px 0}
.tv-inhoud{flex:1;padding:12px 40px 30px;overflow:hidden}
.tv table{font-size:24px}
.tv th{font-size:15px;color:rgba(255,255,255,.6);border-bottom:2px solid rgba(255,255,255,.2)}
.tv td{border-bottom:1px solid rgba(255,255,255,.12);padding:12px 10px}
.tv .tijd{background:rgba(255,255,255,.12);color:#fff;font-size:20px}
.tv .veldtag{color:rgba(255,255,255,.6);font-size:15px}
.tv .score{font-size:26px}
.tv .badge{font-size:14px}
.tv .b-concept{background:rgba(255,255,255,.14);color:#fff}
.tv .poule-grid{gap:24px}
.tv .poule{border-color:rgba(255,255,255,.2)}
.tv .poule-kop{background:rgba(0,0,0,.25);font-size:20px}
.tv .poule table{font-size:22px}
.tv .tlogo{width:26px;height:26px}
.tv-voet{padding:12px 40px;font-size:15px;color:rgba(255,255,255,.5);display:flex;justify-content:space-between}
/* ---------- categorie-bal ---------- */
.cat-bal{width:58px;height:58px;border-radius:50%;background:linear-gradient(155deg,var(--blauw-d),var(--blauw));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:18px;flex-shrink:0;box-shadow:var(--shadow)}
.cat-bal.ob{background:linear-gradient(155deg,#166B3C,#2FB56A)}
.cat-bal.mb{background:linear-gradient(155deg,#1D3E7A,#4E86E8)}
.cat-bal.bb{background:linear-gradient(155deg,#9A3D0C,#F59E0B)}
.cat-bal.bel{background:linear-gradient(155deg,#101B14,#3D4B42);font-size:14px}
/* ---------- split landing ---------- */
.btn-b{background:var(--hemel);color:#fff}
.btn-b:hover{background:#3B72D4}
.hero-b{background:var(--blauw-d)}
.split{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 60px)}
.paneel{position:relative;overflow:hidden;color:#fff;padding:76px 52px;display:flex;flex-direction:column;justify-content:center}
.paneel::before{content:'';position:absolute;width:560px;height:560px;border:2px dashed rgba(255,255,255,.13);border-radius:50%;top:-170px;right:-170px;pointer-events:none}
.paneel-t{background:linear-gradient(155deg,rgba(13,59,32,.93) 0%,rgba(26,100,56,.90) 100%),url('foto-toernooi.jpg') center/cover no-repeat,linear-gradient(155deg,var(--groen-d),#1A6438)}
.paneel-w{background:linear-gradient(155deg,rgba(22,35,63,.93) 0%,rgba(44,79,140,.90) 100%),url('foto-oefenmatch.jpg') center/cover no-repeat,linear-gradient(155deg,var(--blauw-d),var(--blauw))}
.paneel .tag{font-size:12.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-bottom:14px}
.paneel h2{font-size:clamp(26px,3.4vw,40px);font-weight:800;letter-spacing:-.005em;word-spacing:.12em;margin-bottom:14px}
.paneel p.lead{font-size:16px;opacity:.85;max-width:440px;margin-bottom:22px}
.paneel ul{list-style:none;margin-bottom:30px;display:grid;gap:9px}
.paneel li{font-size:14.5px;opacity:.92;display:flex;gap:10px;align-items:flex-start}
.paneel li::before{content:'✓';font-weight:800;color:var(--geel)}
.paneel-w li::before{color:#9BBCF5}
.paneel .btn{align-self:flex-start;font-size:15.5px;padding:13px 26px}
@media(max-width:860px){.split{grid-template-columns:1fr;min-height:auto}.paneel{padding:52px 24px}}
@media print{
  .topbar,.tabs,.btn,select,.stat-rij,#toast,footer,details,.melding{display:none !important}
  body{background:#fff}
  .kaart{border:none;box-shadow:none;padding:0}
  .wrap{padding:0;max-width:none}
}
@media(max-width:640px){
  .w-tabel tr:first-child{display:none}
  .w-tabel,.w-tabel tr,.w-tabel td{display:block;border:none}
  .w-tabel tr{display:flex;flex-wrap:wrap;gap:6px 8px;align-items:center;padding:11px 0;border-bottom:1px solid var(--lijn)}
  .w-tabel tr:last-child{border-bottom:none}
  .w-tabel td{padding:0}
  .w-tabel td.c-wed{flex-basis:100%;order:6;font-weight:600;font-size:14.5px}
  .w-tabel td.c-score{margin-left:auto;order:5}
  .topbar nav a.verberg-m{display:none}
  .topbar-in{padding:0 10px;gap:6px}
  .topbar nav{gap:0}
  .topbar nav a.nav-pil,.topbar nav button.nav-pil{padding:7px 9px;font-size:11.5px}
  .topbar nav{gap:4px}
  .topbar-in{padding:6px 8px;height:auto;min-height:60px;flex-wrap:wrap}
  .topbar nav{flex-wrap:wrap;justify-content:flex-end}
  .logo{flex-direction:column;gap:2px;font-size:12px;letter-spacing:0}
  .logo .bal{width:16px;height:16px}
  .logo .bal::after{inset:4px}
  .kaart{padding:16px}
  td,th{padding:7px 6px;font-size:13px}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>
<script>
/* ============================================================
   SJOTTER
   ============================================================ */
const CONFIG = {
  SUPABASE_URL: 'https://equmwyvxbjjocwetwfcw.supabase.co',
  SUPABASE_ANON_KEY: 'sb_publishable_wLF8ZNLFbiWM8YGrEnzjXQ_Aon8llxh',
  SUPER_ADMIN_UID: '95fca7a8-1e59-4158-9414-780704d96fe3',
  PLATFORM: 'Sjotter',
  PRIJS: 25,
  IBAN: 'BE00 0000 0000 0000',
  BEGUNSTIGDE: 'Sjotter',
  CONTACT_EMAIL: 'sjotter.be@gmail.com',
  EMAILJS_PUBLIC_KEY: 'D7_aR9T9QSxZaEhgC',
  EMAILJS_SERVICE: 'service_zzty9kh',
  EMAILJS_TEMPLATE: 'template_jmj1ncn',
};

const sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
if (window.emailjs && CONFIG.EMAILJS_PUBLIC_KEY !== 'VUL_IN') emailjs.init({ publicKey: CONFIG.EMAILJS_PUBLIC_KEY });
let sessie = null;
let mijnClub = null;

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const root = () => $('#root');
const h = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('zien'); clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove('zien'),2600); }
function fout(e){ console.error(e); toast('⚠ ' + (e?.message || 'Er ging iets mis')); }
const rand = n => Array.from({length:n},()=> 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*31)]).join('');
const slugify = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
function tijdPlus(t, min){ const [u,m] = t.split(':').map(Number); const tot = u*60+m+min; return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0'); }
function datumNL(d){ if(!d) return '—'; return new Date(d+'T00:00').toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function shuffle(a){ const x=[...a]; for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];} return x; }
function teamNaam(t){ return t ? h(t.club_naam + (t.team_naam ? ' ' + t.team_naam : '')) : '—'; }
function teamHtml(t){ if (!t) return '—'; return (t.logo_url ? `<img class="tlogo" src="${h(t.logo_url)}" alt="">` : '') + teamNaam(t); }
const isAdmin = () => sessie && sessie.user.id === CONFIG.SUPER_ADMIN_UID;
const veiligeKleur = k => (typeof k === 'string' && /^#[0-9a-fA-F]{6}$/.test(k)) ? k : null;

async function uploadLogo(file, maat = 128){
  const img = await createImageBitmap(file);
  const c = document.createElement('canvas'); c.width = maat; c.height = maat;
  const ctx = c.getContext('2d');
  const s = Math.min(maat / img.width, maat / img.height);
  const w = img.width * s, hh = img.height * s;
  ctx.drawImage(img, (maat - w) / 2, (maat - hh) / 2, w, hh);
  const blob = await new Promise(r => c.toBlob(r, 'image/png'));
  const pad = 'logo-' + rand(12).toLowerCase() + '.png';
  const { error } = await sb.storage.from('logos').upload(pad, blob, { contentType: 'image/png' });
  if (error) throw error;
  return sb.storage.from('logos').getPublicUrl(pad).data.publicUrl;
}

/* ---------- router ---------- */
window.addEventListener('hashchange', render);

async function boot(){
  const { data } = await sb.auth.getSession();
  sessie = data.session;
  // "aangemeld blijven" niet aangevinkt -> sessie vervalt bij sluiten van de browser
  if (sessie && localStorage.getItem('sjotter_tijdelijk') === '1' && !sessionStorage.getItem('sjotter_actief')) {
    await sb.auth.signOut();
    sessie = null;
    localStorage.removeItem('sjotter_tijdelijk');
  }
  sb.auth.onAuthStateChange((_e, s) => { sessie = s; });
  render();
}

async function render(){
  if (location.hash.includes('access_token=')) {
    const herstel = location.hash.includes('type=recovery');
    setTimeout(() => { location.hash = herstel ? '#/nieuw-wachtwoord' : '#/dashboard'; }, 400);
    return;
  }
  if (window._tvRot) { clearInterval(window._tvRot); window._tvRot = null; }
  if (window._tvRef) { clearInterval(window._tvRef); window._tvRef = null; }
  const hash = location.hash.replace(/^#\/?/, '');
  const p = hash.split('/');
  window.scrollTo(0,0);
  try {
    if (p[0] === 'login') return vAuth('login');
    if (p[0] === 'wachtwoord') return vWachtwoordVergeten();
    if (p[0] === 'nieuw-wachtwoord') return vNieuwWachtwoord();
    if (p[0] === 'registreren') return vAuth('registreren');
    if (p[0] === 'dashboard') return vDashboard();
    if (p[0] === 't' && p[1]) return vBeheer(p[1], p[2] || 'instellingen');
    if (p[0] === 'p' && p[1]) return vPubliek(p[1], p[2] || 'info', p[3]);
    if (p[0] === 'toernooien') return vKalender();
    if (p[0] === 'privacy') return vPrivacy();
    if (p[0] === 'help') return vHelp();
    if (p[0] === 'admin') return vAdmin();
    if (p[0] === 's' && p[1]) return vScheids(p[1]);
    if (p[0] === 'tv' && p[1]) return vTv(p[1]);
    if (p[0] === 'wedstrijden') {
      if (p[1] === 'plaatsen') return vZoekPlaatsen();
      if (p[1] === 'beheer' && p[2] && p[3]) return vZoekBeheer(p[2], p[3]);
      return vZoekLijst();
    }
    return vLanding();
  } catch(e){ fout(e); }
}

window.app = {};

app.registreer = async () => {
  const club = $('#f-club').value.trim(), email = $('#f-email').value.trim(), ww = $('#f-ww').value;
  if (!club || !email || ww.length < 6) return toast('Vul alles in (wachtwoord min. 6 tekens)');
  if (ww !== $('#f-ww2').value) return toast('De wachtwoorden komen niet overeen');
  const { data, error } = await sb.auth.signUp({ email, password: ww });
  if (error) return fout(error);
  if (!data.session) {
    localStorage.setItem('sj_clubnaam', club);
    $('#auth-melding').innerHTML = `<div class="melding m-info">Check je mailbox en bevestig je e-mailadres. Meld je daarna aan.</div>`;
    return;
  }
  sessie = data.session;
  await sb.from('clubs').insert({ id: data.user.id, club_naam: club, email });
  location.hash = '#/dashboard';
};

app.login = async () => {
  const email = $('#f-email').value.trim(), ww = $('#f-ww').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: ww });
  if (error) return fout(error);
  sessie = data.session;
  if ($('#f-onthoud') && !$('#f-onthoud').checked) {
    localStorage.setItem('sjotter_tijdelijk', '1');
    sessionStorage.setItem('sjotter_actief', '1');
  } else {
    localStorage.removeItem('sjotter_tijdelijk');
  }
  // clubs-rij aanmaken indien nog niet (bv. na e-mailbevestiging)
  const { data: c } = await sb.from('clubs').select('id').eq('id', data.user.id).maybeSingle();
  if (!c) await sb.from('clubs').insert({ id: data.user.id, club_naam: localStorage.getItem('sj_clubnaam') || email.split('@')[0], email });
  location.hash = '#/dashboard';
};

app.uitloggen = async () => { await sb.auth.signOut(); sessie = null; mijnClub = null; if (location.hash === '' || location.hash === '#/') render(); else location.hash = '#/'; toast('Afgemeld'); };

app.nieuwToernooi = async () => {

/* ============================================================

   ============================================================ */
async function laadToernooi(id){
  const [t, cats, teams, wed, srs] = await Promise.all([
    sb.from('toernooien').select('*').eq('id', id).single(),
    sb.from('categorieen').select('*').eq('toernooi_id', id).order('volgorde').order('naam'),
    sb.from('teams').select('*').eq('toernooi_id', id).order('created_at'),
    sb.from('wedstrijden').select('*').eq('toernooi_id', id).order('volgorde'),
    sb.from('scheidsrechters').select('*').eq('toernooi_id', id).order('naam'),
  ]);
  if (t.error) throw t.error;
  return { t: t.data, cats: cats.data || [], teams: teams.data || [], wed: wed.data || [], scheids: srs.data || [] };
}

const RANG_NAMEN = { saldo:'Doelsaldo', onderling:'Onderling resultaat', gescoord:'Gescoorde doelpunten', tegen:'Minste tegendoelpunten', gewonnen:'Gewonnen wedstrijden' };

function tekenRang(){
  const el = $('#rang-lijst');
  if (!el) return;
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--lijn);border-radius:8px 8px 0 0;background:var(--papier);font-size:14px;color:var(--grijs)"><strong style="color:var(--inkt)">1. Aantal punten</strong> (vast)</div>
    ${window._rang.map((k, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:7px 12px;border:1px solid var(--lijn);border-top:none;font-size:14px;${i===window._rang.length-1?'border-radius:0 0 8px 8px':''}">
      <span style="flex:1"><strong>${i+2}.</strong> ${RANG_NAMEN[k]}</span>
      <button class="btn btn-o btn-sm" style="padding:3px 9px" ${i===0?'disabled':''} onclick="app.rangMove(${i},-1)">▲</button>
      <button class="btn btn-o btn-sm" style="padding:3px 9px" ${i===window._rang.length-1?'disabled':''} onclick="app.rangMove(${i},1)">▼</button>
    </div>`).join('')}`;
}

app.rangMove = (i, d) => {
  const r = window._rang;
  const j = i + d;
  if (j < 0 || j >= r.length) return;
  [r[i], r[j]] = [r[j], r[i]];
  tekenRang();
};

app.loting = async (cid) => {
  const d = $('#tab-inhoud')._d;
  const c = d.cats.find(x => x.id === cid);
  const ts = d.teams.filter(x => x.categorie_id === cid);
  if (d.wed.some(w => w.categorie_id === cid) && !confirm('Er bestaat al een schema voor deze categorie. Opnieuw loten maakt dat schema ongeldig. Doorgaan?')) return;
  // groepeer per club, grootste clubs eerst, verdeel rond (houdt clubgenoten uit elkaar)
  const perClub = {};
  ts.forEach(t => (perClub[t.club_naam.toLowerCase()] ||= []).push(t));
  const groepen = shuffle(Object.values(perClub)).sort((a,b) => b.length - a.length);
  const letters = Array.from({length: c.aantal_poules}, (_,i) => String.fromCharCode(65+i));
  const telling = Object.fromEntries(letters.map(L => [L, 0]));
  const updates = [];
  for (const groep of groepen) {
    for (const team of shuffle(groep)) {
      // kies poule met minste ploegen, mijd poules waar deze club al in zit indien mogelijk
      const clubIn = new Set(updates.filter(u => u.club === team.club_naam.toLowerCase()).map(u => u.poule));
      let kandidaten = letters.filter(L => !clubIn.has(L));
      if (!kandidaten.length) kandidaten = letters;
      kandidaten.sort((a,b) => telling[a] - telling[b]);
      const L = kandidaten[0];
      telling[L]++;
      updates.push({ id: team.id, poule: L, club: team.club_naam.toLowerCase() });
    }
  }
  for (const u of updates) await sb.from('teams').update({ poule: u.poule }).eq('id', u.id);
  toast('Loting uitgevoerd 🎲'); render();
};

/* ============================================================
   SCHEMA-ENGINE
   ============================================================ */
function roundRobin(ids){
  const arr = [...ids];
  if (arr.length % 2) arr.push(null);
  const n = arr.length, rondes = [];
  for (let r = 0; r < n - 1; r++) {
    const rd = [];
    for (let i = 0; i < n / 2; i++) {
      const a = arr[i], b = arr[n - 1 - i];
      if (a && b) rd.push(r % 2 ? [b, a] : [a, b]);
    }
    rondes.push(rd);
    arr.splice(1, 0, arr.pop());
  }
  return rondes;
}

function bouwSchema(d){
  const { t } = d;
  // verzamel alle poulewedstrijden
  let pool = [];
  for (const c of d.cats) {
    const letters = [...new Set(d.teams.filter(x => x.categorie_id === c.id && x.poule).map(x => x.poule))].sort();
    for (const L of letters) {
      const ids = d.teams.filter(x => x.categorie_id === c.id && x.poule === L).map(x => x.id);
      if (ids.length < 2) continue;
      roundRobin(ids).forEach((rd, ri) => rd.forEach(([a, b]) => pool.push({ cat: c.id, poule: L, a, b, ronde: ri })));
    }
  }
  pool.sort((x, y) => x.ronde - y.ronde);
  // greedy: per tijdslot max #velden wedstrijden, geen ploeg 2x in zelfde slot, liefst geen ploeg 2 slots na elkaar
  const slots = [];
  let vorige = new Set();
  let guard = 0;
  while (pool.length && guard++ < 2000) {
    const slot = [], bezet = new Set();
    for (const rustEerst of [true, false]) {
      for (let i = 0; i < pool.length && slot.length < t.aantal_velden; i++) {
        const m = pool[i];
        if (bezet.has(m.a) || bezet.has(m.b)) continue;
        if (rustEerst && (vorige.has(m.a) || vorige.has(m.b))) continue;
        slot.push(m); bezet.add(m.a); bezet.add(m.b);
        pool.splice(i, 1); i--;
      }
    }
    slots.push(slot);
    vorige = bezet;
  }
  // omzetten naar rijen (met optionele middagpauze)
  const slotDuur = t.wedstrijdduur + t.pauze;
  const rijen = [];
  let cursor = t.starttijd;
  let pauzeGedaan = !(t.pauze_start && t.pauze_duur);
  slots.forEach((slot, si) => {
    if (!pauzeGedaan && cursor >= t.pauze_start) { cursor = tijdPlus(cursor, t.pauze_duur); pauzeGedaan = true; }
    slot.forEach((m, vi) => rijen.push({
      toernooi_id: t.id, categorie_id: m.cat, fase: 'poule', poule: m.poule,
      team_a: m.a, team_b: m.b, veld: vi + 1,
      starttijd: cursor, volgorde: si * 100 + vi
    }));
    cursor = tijdPlus(cursor, slotDuur);
  });
  return rijen;
}

/* ============================================================
   STANDEN & FINALES
   ============================================================ */
function berekenStand(teams, wedstrijden, modus = 'saldo'){
  const rij = Object.fromEntries(teams.map(t => [t.id, { team: t, g:0, w:0, gel:0, v:0, dv:0, dt:0, ptn:0 }]));
  for (const m of wedstrijden) {
    if (m.score_a == null || m.score_b == null) continue;
    const A = rij[m.team_a], B = rij[m.team_b];
    if (!A || !B) continue;
    A.g++; B.g++; A.dv += m.score_a; A.dt += m.score_b; B.dv += m.score_b; B.dt += m.score_a;
    if (m.score_a > m.score_b) { A.w++; B.v++; A.ptn += 3; }
    else if (m.score_a < m.score_b) { B.w++; A.v++; B.ptn += 3; }
    else { A.gel++; B.gel++; A.ptn++; B.ptn++; }
  }
  const arr = Object.values(rij);
  // criteria-volgorde: nieuw formaat = csv, oude waarden migreren
  let volg;
  if ((modus || '').includes(',')) volg = modus.split(',');
  else if (modus === 'onderling') volg = ['onderling','saldo','gescoord','tegen','gewonnen'];
  else volg = ['saldo','onderling','gescoord','tegen','gewonnen'];
  arr.sort((a,b) => b.ptn - a.ptn);
  const res = [];
  let i = 0;
  while (i < arr.length) {
    let j = i; while (j < arr.length && arr[j].ptn === arr[i].ptn) j++;
    const groep = arr.slice(i, j);
    if (groep.length > 1) {
      // onderlinge mini-tabel binnen de puntengroep
      const ids = new Set(groep.map(r => r.team.id));
      const mini = Object.fromEntries(groep.map(r => [r.team.id, { ptn:0, dv:0, dt:0 }]));
      for (const m of wedstrijden) {
        if (m.score_a == null || !ids.has(m.team_a) || !ids.has(m.team_b)) continue;
        const A = mini[m.team_a], B = mini[m.team_b];
        A.dv += m.score_a; A.dt += m.score_b; B.dv += m.score_b; B.dt += m.score_a;
        if (m.score_a > m.score_b) A.ptn += 3; else if (m.score_a < m.score_b) B.ptn += 3; else { A.ptn++; B.ptn++; }
      }
      groep.sort((a,b) => {
        for (const c of volg) {
          let v = 0;
          if (c === 'saldo') v = (b.dv - b.dt) - (a.dv - a.dt);
          else if (c === 'gescoord') v = b.dv - a.dv;
          else if (c === 'tegen') v = a.dt - b.dt;
          else if (c === 'gewonnen') v = b.w - a.w;
          else if (c === 'onderling') {
            const ma = mini[a.team.id], mb = mini[b.team.id];
            v = mb.ptn - ma.ptn || (mb.dv - mb.dt) - (ma.dv - ma.dt);
          }
          if (v) return v;
        }
        return a.team.club_naam.localeCompare(b.team.club_naam);
      });
    }
    res.push(...groep);
    i = j;
  }
  return res;
}



app.genereerFinales = async () => {
  const d = $('#tab-inhoud')._d;
  const modus = $('#fin-modus') ? $('#fin-modus').value : 'recht';
  const { t } = d;
  let laatste = d.wed.reduce((m,w) => (w.starttijd||'') > m ? w.starttijd : m, t.starttijd);
  const slotDuur = t.wedstrijdduur + t.pauze;
  const nieuwe = [];
  const meldingen = [];
  const win = w => w.score_a > w.score_b ? w.team_a : w.team_b;
  const verl = w => w.score_a > w.score_b ? w.team_b : w.team_a;

  for (const c of d.cats) {
    const catW = d.wed.filter(w => w.categorie_id === c.id && w.fase === 'poule');
    if (!catW.length) continue;
    if (catW.some(w => w.score_a == null)) { meldingen.push(`${c.naam}: poulefase nog niet volledig`); continue; }
    const letters = [...new Set(d.teams.filter(x => x.categorie_id === c.id && x.poule).map(x => x.poule))].sort();
    if (letters.length !== 2) { if (letters.length > 2) meldingen.push(`${c.naam}: ${letters.length} poules — gebruik "wedstrijd manueel toevoegen"`); continue; }
    const standA = berekenStand(d.teams.filter(x=>x.categorie_id===c.id&&x.poule===letters[0]), catW.filter(w=>w.poule===letters[0]), t.rangschikking);
    const standB = berekenStand(d.teams.filter(x=>x.categorie_id===c.id&&x.poule===letters[1]), catW.filter(w=>w.poule===letters[1]), t.rangschikking);
    const finales = d.wed.filter(w => w.categorie_id === c.id && w.fase === 'finale');
    const hfs = finales.filter(w => (w.label||'').startsWith('Halve finale')).sort((a,b)=>(a.label||'').localeCompare(b.label||''));
    const n = Math.min(standA.length, standB.length);

    if (modus === 'kruis') {
      if (!hfs.length) {
        if (finales.length) { meldingen.push(`${c.naam}: er bestaan al finalewedstrijden — verwijder ze eerst`); continue; }
        if (n < 2) { meldingen.push(`${c.naam}: te weinig ploegen per poule voor kruisfinales`); continue; }
        nieuwe.push({ toernooi_id: t.id, categorie_id: c.id, fase: 'finale', label: 'Halve finale 1', team_a: standA[0].team.id, team_b: standB[1].team.id, volgorde: 100000 });
        nieuwe.push({ toernooi_id: t.id, categorie_id: c.id, fase: 'finale', label: 'Halve finale 2', team_a: standB[0].team.id, team_b: standA[1].team.id, volgorde: 100001 });
        for (let i = 2; i < n; i++) {
          nieuwe.push({ toernooi_id: t.id, categorie_id: c.id, fase: 'finale', label: `Plaats ${i*2+1}-${i*2+2}`, team_a: standA[i].team.id, team_b: standB[i].team.id, volgorde: 100002 + i });
        }
      } else if (!finales.some(w => w.label === 'Finale')) {
        if (hfs.length < 2 || hfs.some(w => w.score_a == null)) { meldingen.push(`${c.naam}: halve finales nog niet (volledig) gespeeld`); continue; }
        if (hfs.some(w => w.score_a === w.score_b)) { meldingen.push(`${c.naam}: halve finale eindigde gelijk — geef de winnaar (bv. na penalty's) 1 doelpunt extra`); continue; }
        nieuwe.push({ toernooi_id: t.id, categorie_id: c.id, fase: 'finale', label: 'Finale', team_a: win(hfs[0]), team_b: win(hfs[1]), volgorde: 150001 });
        nieuwe.push({ toernooi_id: t.id, categorie_id: c.id, fase: 'finale', label: 'Plaats 3-4', team_a: verl(hfs[0]), team_b: verl(hfs[1]), volgorde: 150000 });
      }
    } else {
      if (finales.length) continue;
      for (let i = 0; i < n; i++) {
        nieuwe.push({ toernooi_id: t.id, categorie_id: c.id, fase: 'finale',
          label: i === 0 ? 'Finale' : `Plaats ${i*2+1}-${i*2+2}`,
          team_a: standA[i].team.id, team_b: standB[i].team.id, volgorde: 100000 + i });
      }
    }
  }

  if (!nieuwe.length) return toast(meldingen[0] || 'Geen finales te genereren');
  // plannen na de laatste bestaande wedstrijd; belangrijkste wedstrijd als laatste
  nieuwe.sort((a,b) => b.volgorde - a.volgorde);
  const perSlot = [];
  for (const w of nieuwe) {
    if (!perSlot.length || perSlot[perSlot.length-1].length >= t.aantal_velden) perSlot.push([]);
    perSlot[perSlot.length-1].push(w);
  }
  perSlot.forEach((s, si) => s.forEach((w, vi) => { w.starttijd = tijdPlus(laatste, (si+1)*slotDuur); w.veld = vi+1; }));
  const { error } = await sb.from('wedstrijden').insert(nieuwe);
  if (error) return fout(error);
  toast(`${nieuwe.length} wedstrijd(en) toegevoegd 🏆`);
  if (meldingen.length) setTimeout(() => toast(meldingen[0]), 2800);
  render();
};

    if (!ws.length) return '';
    const letters = [...new Set(d.teams.filter(x=>x.categorie_id===c.id&&x.poule).map(x=>x.poule))].sort();
    return `<div class="kaart">
      <h3>${h(c.naam)}</h3>
      <table class="w-tabel" style="margin-top:10px"><tr><th>Tijd</th><th></th><th>Wedstrijd</th><th style="text-align:center">Score</th></tr>
      ${ws.map(w => `<tr>
        <td class="c-tijd"><span class="tijd">${w.starttijd||'—'}</span></td>
        <td class="c-fase"><span class="badge ${w.fase==='finale'?'b-geel':'b-concept'}">${w.fase==='finale'? h(w.label||'Finale') : h(w.poule||'')}</span></td>
        <td class="c-wed">${teamHtml(teamMap[w.team_a])} — ${teamHtml(teamMap[w.team_b])}</td>
        <td class="score c-score" style="text-align:center;white-space:nowrap">
          <input id="sa-${w.id}" type="number" min="0" value="${w.score_a ?? ''}" onchange="app.autoScore('${w.id}')"> -
          <input id="sb-${w.id}" type="number" min="0" value="${w.score_b ?? ''}" onchange="app.autoScore('${w.id}')">
        </td>
      </tr>`).join('')}
      </table>
      ${letters.length ? `<hr class="krijt"><div class="poule-grid">${letters.map(L => standTabel(L,
        berekenStand(d.teams.filter(x=>x.categorie_id===c.id&&x.poule===L), ws.filter(w=>w.fase==='poule'&&w.poule===L), d.t.rangschikking))).join('')}</div>` : ''}
    </div>`;
  }).join('') || '<div class="kaart"><div class="leeg">Genereer eerst een schema.</div></div>';
}

function standTabel(L, stand){
  return `<div class="poule"><div class="poule-kop">Stand poule ${h(L)}</div>
  <table><tr><th></th><th>Ploeg</th><th class="num">G</th><th class="num">+/−</th><th class="num">Ptn</th></tr>
  ${stand.map((r,i) => `<tr><td class="num">${i+1}</td><td>${teamHtml(r.team)}</td><td class="num">${r.g}</td><td class="num">${r.dv-r.dt>0?'+':''}${r.dv-r.dt}</td><td class="num"><strong>${r.ptn}</strong></td></tr>`).join('')}
  </table></div>`;
}

app.autoScore = async (wid) => {
  const a = $(`#sa-${wid}`).value, b = $(`#sb-${wid}`).value;
  if ((a === '') !== (b === '')) return; // wacht tot beide ingevuld (of beide leeg)
  const { error } = await sb.from('wedstrijden').update({
    score_a: a === '' ? null : +a, score_b: b === '' ? null : +b
  }).eq('id', wid);
  if (error) return fout(error);
  toast('Score bewaard ✓'); render();
};

async function vPubliek(slug, tab, extra){
  root().innerHTML = topbar() + `<div class="wrap"><div class="leeg">Laden…</div></div>`;
  const { data: t, error } = await sb.from('toernooien').select('*').eq('slug', slug).maybeSingle();
  if (error) return fout(error);
  if (!t) return root().innerHTML = topbar() + `<div class="wrap"><div class="kaart"><div class="leeg">Toernooi niet gevonden of niet (meer) gepubliceerd.</div></div></div>`;
  const [cats, teams, wed, sps, srs] = await Promise.all([
    sb.from('categorieen').select('*').eq('toernooi_id', t.id).order('volgorde').order('naam'),
    sb.from('teams').select('*').eq('toernooi_id', t.id),
    sb.from('wedstrijden').select('*').eq('toernooi_id', t.id).order('volgorde'),
    sb.from('sponsors').select('*').eq('toernooi_id', t.id).order('volgorde').order('naam'),
    sb.from('scheidsrechters').select('*').eq('toernooi_id', t.id),
  ]);
  const d = { t, cats: cats.data||[], teams: teams.data||[], wed: wed.data||[], sponsors: sps.data||[], scheids: srs.data||[] };
  const P = n => `#/p/${slug}/${n}`;
  const open = t.inschrijving_open && (!t.deadline || t.deadline >= new Date().toISOString().slice(0,10));

  const kleur = veiligeKleur(t.kleur);
  root().innerHTML = topbar() + `
  ${kleur ? `<style>#root .hero{background:${kleur}} #root .poule-kop{background:${kleur}}</style>` : ''}
  <section class="hero" style="padding:44px 20px 50px"><div class="hero-in">
    <h1 style="font-size:clamp(26px,5vw,42px)">${h(t.naam)}</h1>
    <p style="margin-bottom:0">${datumNL(t.datum)} · ${h(t.locatie||'')}</p>
  </div></section>
  <div class="wrap">
    <div class="tabs" style="margin-top:0">
      ${[['info','Info'],['deelnemers','Deelnemers'],['inschrijven','Inschrijven'],['programma','Programma'],['standen','Standen']]
        .map(([k,l]) => `<a href="${P(k)}" class="${tab===k?'act':''}">${l}${k==='inschrijven'&&open?' 🟢':''}</a>`).join('')}
    </div>
    <div id="pub-inhoud"></div>
    ${d.sponsors.length ? `<div class="sponsor-strook">
      ${d.sponsors.map(s => { const inner = s.logo_url ? `<img src="${h(s.logo_url)}" alt="${h(s.naam)}" title="${h(s.naam)}">` : `<span class="s-naam">${h(s.naam)}</span>`;
        return s.website ? `<a href="${h(s.website)}" target="_blank" rel="noopener">${inner}</a>` : inner; }).join('')}
    </div>` : ''}
  </div>` + voet();

  const el = $('#pub-inhoud');
  if (tab === 'team' && extra) return pubTeam(el, d, extra);
  if (tab === 'deelnemers') pubDeelnemers(el, d);
  if (tab === 'info') pubInfo(el, d, open);
  if (tab === 'inschrijven') pubInschrijven(el, d, open);
  if (tab === 'programma') pubProgramma(el, d);
  if (tab === 'standen') pubStanden(el, d);
}

function pubTeam(el, d, teamId){
  const team = d.teams.find(x => x.id === teamId);
  if (!team) return el.innerHTML = '<div class="kaart"><div class="leeg">Ploeg niet gevonden.</div></div>';
  const cat = d.cats.find(c => c.id === team.categorie_id);
  const teamMap = Object.fromEntries(d.teams.map(x => [x.id, x]));
  const ws = d.wed.filter(w => w.team_a === teamId || w.team_b === teamId).sort((a,b) => (a.starttijd||'').localeCompare(b.starttijd||''));
  let standHtml = '';
  if (team.poule) {
    const stand = berekenStand(
      d.teams.filter(x => x.categorie_id === team.categorie_id && x.poule === team.poule),
      d.wed.filter(w => w.categorie_id === team.categorie_id && w.fase === 'poule' && w.poule === team.poule),
      d.t.rangschikking);
    const pos = stand.findIndex(r => r.team.id === teamId) + 1;
    standHtml = `<p class="sub" style="margin-top:6px">Poule ${h(team.poule)}${pos ? ` · momenteel <strong>${pos}e</strong> van ${stand.length}` : ''}</p>`;
  }
  el.innerHTML = `
  <a href="#/p/${d.t.slug}/deelnemers" style="font-size:13.5px">← Alle deelnemers</a>
  <div class="kaart" style="margin-top:10px">
    <div style="display:flex;gap:16px;align-items:center">
      ${team.logo_url ? `<img src="${h(team.logo_url)}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:1px solid var(--lijn);background:#fff">` : ''}
      <div>
        <h3 style="font-size:20px">${teamNaam(team)}</h3>
        <p class="sub">${h(cat?.naam||'')}${team.stamnummer ? ' · stamnr. ' + h(team.stamnummer) : ''}</p>
        ${standHtml}
      </div>
    </div>
    <hr class="krijt">
    ${ws.length ? `<table class="w-tabel"><tr><th>Tijd</th><th>Veld</th><th></th><th>Wedstrijd</th><th style="text-align:center">Uitslag</th></tr>
      ${ws.map(w => `<tr>
        <td class="c-tijd"><span class="tijd">${w.starttijd||'—'}</span></td>
        <td class="c-veld"><span class="veldtag">Veld ${w.veld||'—'}</span></td>
        <td class="c-fase"><span class="badge ${w.fase==='finale'?'b-geel':'b-concept'}">${w.fase==='finale'? h(w.label||'Finale') : 'Poule '+h(w.poule||'')}</span></td>
        <td class="c-wed">${teamHtml(teamMap[w.team_a])} — ${teamHtml(teamMap[w.team_b])}</td>
        <td class="score c-score" style="text-align:center">${w.score_a==null?'· - ·':'<strong>'+w.score_a+' - '+w.score_b+'</strong>'}</td>
      </tr>`).join('')}
    </table>` : '<div class="leeg">Nog geen wedstrijden ingepland voor deze ploeg.</div>'}
  </div>`;
}

/* ============================================================
   TV-MODUS (groot scherm, roteert automatisch)
   ============================================================ */
let _tv = null;

async function vTv(slug){
  const { data: t } = await sb.from('toernooien').select('*').eq('slug', slug).maybeSingle();
  if (!t) return root().innerHTML = `<div class="wrap"><div class="kaart"><div class="leeg">Toernooi niet gevonden.</div></div></div>`;
  _tv = { t, slide: 0 };
  await tvLaad();
  tvTeken();
  window._tvRot = setInterval(() => { _tv.slide++; tvTeken(); }, 12000);
  window._tvRef = setInterval(async () => { await tvLaad(); tvTeken(false); }, 30000);
}

async function tvLaad(){
  const tid = _tv.t.id;
  const [cats, teams, wed, sps] = await Promise.all([
    sb.from('categorieen').select('*').eq('toernooi_id', tid).order('volgorde').order('naam'),
    sb.from('teams').select('*').eq('toernooi_id', tid),
    sb.from('wedstrijden').select('*').eq('toernooi_id', tid).order('volgorde'),
    sb.from('sponsors').select('*').eq('toernooi_id', tid).order('volgorde').order('naam'),
  ]);
  _tv.cats = cats.data || []; _tv.teams = teams.data || []; _tv.wed = wed.data || []; _tv.sponsors = sps.data || [];
}

function tvSlides(){
  const s = [];
  for (const c of _tv.cats) {
    if (_tv.wed.some(w => w.categorie_id === c.id)) s.push({ type: 'prog', cat: c });
    if (_tv.teams.some(x => x.categorie_id === c.id && x.poule)) s.push({ type: 'stand', cat: c });
  }
  if ((_tv.sponsors || []).length) s.push({ type: 'sponsors' });
  return s.length ? s : [{ type: 'leeg' }];
}

function tvTeken(reset = true){
  if (!location.hash.startsWith('#/tv/')) return;
  const slides = tvSlides();
  const sl = slides[_tv.slide % slides.length];
  const teamMap = Object.fromEntries(_tv.teams.map(x => [x.id, x]));
  const nu = new Date().toLocaleTimeString('nl-BE', { hour: '2-digit', minute: '2-digit' });
  let inhoud = '', catNaam = '';

  if (sl.type === 'prog') {
    const alleW = _tv.wed.filter(w => w.categorie_id === sl.cat.id);
    const pouleW = alleW.filter(w => w.fase === 'poule');
    const finW = alleW.filter(w => w.fase === 'finale');
    const finaleFase = pouleW.length && pouleW.every(w => w.score_a != null) && finW.length;
    catNaam = sl.cat.naam + (finaleFase ? ' — finales 🏆' : ' — programma');
    const ws = (finaleFase ? finW : alleW).sort((a,b) => a.volgorde - b.volgorde);
    const open = ws.filter(w => w.score_a == null);
    const klaar = ws.filter(w => w.score_a != null).slice(finaleFase ? -6 : -3);
    const tonen = klaar.concat(open.slice(0, 9 - klaar.length));
    inhoud = `<table><tr><th>Tijd</th><th>Veld</th><th></th><th>Wedstrijd</th><th style="text-align:center">Uitslag</th></tr>
      ${tonen.map(w => `<tr>
        <td><span class="tijd">${w.starttijd||'—'}</span></td>
        <td><span class="veldtag">Veld ${w.veld||'—'}</span></td>
        <td><span class="badge ${w.fase==='finale'?'b-geel':'b-concept'}">${w.fase==='finale'? h(w.label||'Finale') : 'Poule '+h(w.poule||'')}</span></td>
        <td>${teamHtml(teamMap[w.team_a])} — ${teamHtml(teamMap[w.team_b])}</td>
        <td class="score" style="text-align:center">${w.score_a==null?'· - ·':'<strong>'+w.score_a+' - '+w.score_b+'</strong>'}</td>
      </tr>`).join('')}
    </table>`;
  } else if (sl.type === 'stand') {
    catNaam = sl.cat.naam + ' — standen';
    const letters = [...new Set(_tv.teams.filter(x => x.categorie_id === sl.cat.id && x.poule).map(x => x.poule))].sort();
    const ws = _tv.wed.filter(w => w.categorie_id === sl.cat.id && w.fase === 'poule');
    inhoud = `<div class="poule-grid">${letters.map(L => standTabel(L,
      berekenStand(_tv.teams.filter(x => x.categorie_id === sl.cat.id && x.poule === L), ws.filter(w => w.poule === L), _tv.t.rangschikking))).join('')}</div>`;
  } else if (sl.type === 'sponsors') {
    catNaam = 'Met dank aan onze sponsors';
    inhoud = `<div style="display:flex;gap:34px;align-items:center;justify-content:center;flex-wrap:wrap;height:100%">
      ${_tv.sponsors.map(s => `<div style="background:#fff;border-radius:14px;padding:22px 30px;display:flex;flex-direction:column;align-items:center;gap:10px;min-width:180px">
        ${s.logo_url ? `<img src="${h(s.logo_url)}" alt="" style="height:72px;max-width:220px;object-fit:contain">` : ''}
        <span style="color:var(--inkt);font-weight:700;font-size:18px">${h(s.naam)}</span>
      </div>`).join('')}
    </div>`;
  } else {
    inhoud = '<div class="leeg" style="color:rgba(255,255,255,.6);font-size:22px">Het programma verschijnt hier zodra het klaar is.</div>';
  }

  const tvKleur = veiligeKleur(_tv.t.kleur);
  root().innerHTML = `<div class="tv"${tvKleur ? ` style="background:${tvKleur}"` : ''}>
    <div class="tv-kop"><h1>${h(_tv.t.naam)}</h1><div class="tv-klok">${nu}</div></div>
    ${catNaam ? `<div class="tv-cat">${h(catNaam)}</div>` : ''}
    <div class="tv-inhoud">${inhoud}</div>
    <div class="tv-voet"><span>${h(_tv.t.locatie||'')}</span><span>${CONFIG.PLATFORM} · live</span></div>
  </div>`;
}

  const modus = $('#sr-modus').value;
  if (!d.wed.length) return toast('Genereer eerst het speelschema');
  const updates = [];

  if (modus === 'veld') {
    const velden = [...new Set(d.wed.map(w => w.veld).filter(Boolean))].sort((a,b) => a - b);
    const n = Math.min(velden.length, d.scheids.length);
    if (!confirm(`Elke scheidsrechter krijgt een vast veld:\n${velden.slice(0, n).map((v, i) => `Veld ${v} → ${d.scheids[i].naam}`).join('\n')}${d.scheids.length < velden.length ? `\n(Velden zonder scheidsrechter blijven leeg)` : ''}\n\nLet op: deze modus houdt geen rekening met beperkingen (categorie/dagdeel/club).\n\nBestaande toewijzingen worden overschreven. Doorgaan?`)) return;
    const perVeld = {};
    velden.forEach((v, i) => perVeld[v] = i < d.scheids.length ? d.scheids[i].id : null);
    d.wed.forEach(w => updates.push({ id: w.id, sr: perVeld[w.veld] ?? null }));
  } else {
    if (!confirm(`De ${d.wed.length} wedstrijden worden willekeurig en evenwichtig verdeeld over ${d.scheids.length} scheidsrechter(s). Niemand krijgt twee wedstrijden op hetzelfde tijdstip.\n\nBestaande toewijzingen worden overschreven. Doorgaan?`)) return;
    const teamMap = Object.fromEntries(d.teams.map(x => [x.id, x]));
    const grens = d.t.pauze_start || '13:00';
    const mag = (s, w) => {
      if (s.cat_ids && !s.cat_ids.split(',').includes(w.categorie_id)) return false;
      if (s.beschikbaar === 'vm' && w.starttijd && w.starttijd >= grens) return false;
      if (s.beschikbaar === 'nm' && w.starttijd && w.starttijd < grens) return false;
      if (s.club && [teamMap[w.team_a], teamMap[w.team_b]].some(x => x && x.club_naam.toLowerCase() === s.club.toLowerCase())) return false;
      return true;
    };
    const perSlot = {};
    d.wed.forEach(w => (perSlot[w.starttijd || '?'] ||= []).push(w));
    const telling = Object.fromEntries(d.scheids.map(s => [s.id, 0]));
    let nietToegewezen = 0;
    for (const tijd of Object.keys(perSlot).sort()) {
      const bezet = new Set();
      for (const w of shuffle(perSlot[tijd])) {
        const vrij = shuffle(d.scheids.filter(s => !bezet.has(s.id) && mag(s, w))).sort((a, b) => telling[a.id] - telling[b.id]);
        const keuze = vrij[0] || null;
        if (keuze) { bezet.add(keuze.id); telling[keuze.id]++; } else nietToegewezen++;
        updates.push({ id: w.id, sr: keuze ? keuze.id : null });
      }
    }
    if (nietToegewezen) setTimeout(() => toast(`${nietToegewezen} wedstrijd(en) zonder scheidsrechter (beperkingen) — wijs manueel toe`), 2800);
  }

  for (const u of updates) {
    const { error } = await sb.from('wedstrijden').update({ scheidsrechter_id: u.sr }).eq('id', u.id);
    if (error) return fout(error);
  }
  toast('Scheidsrechters toegewezen ⚡'); render();
};

};

async function vZoekBeheer(id, code){
  root().innerHTML = topbar() + `<div class="wrap wrap-smal"><div class="kaart" id="z-beheer"><div class="leeg">Laden…</div></div></div>`;
  const { data: z } = await sb.from('zoekertjes').select('*').eq('id', id).maybeSingle();
  if (!z) return $('#z-beheer').innerHTML = '<div class="leeg">Zoekertje niet gevonden (mogelijk al verwijderd).</div>';
  $('#z-beheer').innerHTML = `
    <h3>Beheer zoekertje</h3>
    <p class="sub">${h(z.club_naam)} · ${h(z.categorie)} ${h(z.niveau)} · ${z.flexibel || !z.datum ? 'datum in overleg' : datumNL(z.datum)}</p>
    <p style="margin-top:10px">Status: <span class="badge ${z.status === 'open' ? 'b-live' : 'b-concept'}">${h(z.status)}</span></p>
    <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">
      ${z.status === 'open' ? `<button class="btn btn-b" onclick="app.zoekActie('${h(id)}','${h(code)}','gevonden')">✓ Tegenstander gevonden</button>` : ''}
      <button class="btn btn-r" onclick="app.zoekActie('${h(id)}','${h(code)}','verwijder')">Verwijder zoekertje</button>
    </div>`;
}

app.zoekActie = async (id, code, actie) => {
  if (actie === 'verwijder' && !confirm('Zoekertje definitief verwijderen?')) return;
  const { data, error } = await sb.rpc('zoekertje_beheer', { zid: id, zcode: code, actie });
  if (error) return fout(error);
  if (!data) return toast('Ongeldige beheerlink');
  toast(actie === 'gevonden' ? 'Gemarkeerd als gevonden ✓' : 'Zoekertje verwijderd');
  location.hash = '#/wedstrijden';
};





/* ============================================================
   TOERNOOIKALENDER — Sjotter-toernooien + externe toernooien
   ============================================================ */
async function vKalender(){
  root().innerHTML = topbar() + `
  <section class="hero" style="padding:40px 20px 46px"><div class="hero-in">
    <h1 style="font-size:clamp(26px,5vw,40px)">Toernooikalender</h1>
    <p style="margin-bottom:0">Alle jeugdtoernooien op een rij — meld je ploeg aan of voeg je eigen toernooi toe.</p>
  </div></section>
  <div class="wrap">
    <div id="kal-lijst"><div class="leeg">Laden…</div></div>
    <div class="kaart" style="max-width:640px">
      <h3>Staat jouw toernooi er niet tussen?</h3>
      <p class="sub">Voeg het gratis toe — na een korte controle verschijnt het in de kalender. Organiseer je met ${CONFIG.PLATFORM}? Dan staat je toernooi er automatisch op.</p>
      <div class="rij">
        <div><label>Naam toernooi *</label><input id="k-naam"></div>
        <div><label>Organiserende club *</label><input id="k-club"></div>
      </div>
      <div class="rij">
        <div><label>Datum *</label><input id="k-datum" type="date"></div>
        <div><label>Gemeente *</label><input id="k-gemeente"></div>
        <div><label>Provincie</label><select id="k-prov">${PROVINCIES.map(p=>`<option>${p}</option>`).join('')}</select></div>
      </div>
      <div class="rij">
        <div><label>Categorieën (bv. U8, U10, U12)</label><input id="k-cats"></div>
        <div><label>Link (website / inschrijving)</label><input id="k-link"></div>
      </div>
      <div id="k-melding"></div>
      <button class="btn btn-p" style="margin-top:16px" onclick="app.kalenderToevoegen()">Toernooi toevoegen</button>
    </div>
  </div>` + voet();

  const vandaag = new Date().toISOString().slice(0,10);
  const [sj, ext] = await Promise.all([
    sb.from('toernooien').select('naam, slug, datum, locatie').eq('status', 'gepubliceerd'),
    sb.from('kalender').select('*').eq('status', 'goedgekeurd'),
  ]);
  const items = [];
  (sj.data||[]).forEach(t => { if (t.datum && t.datum >= vandaag) items.push({ datum: t.datum, naam: t.naam, plaats: t.locatie, cats: null, link: '#/p/' + t.slug, sjotter: true }); });
  (ext.data||[]).forEach(k => { if (k.datum && k.datum >= vandaag) items.push({ datum: k.datum, naam: k.naam, plaats: [k.club, k.gemeente].filter(Boolean).join(' · '), cats: k.categorieen, link: k.link, sjotter: false }); });
  items.sort((a,b) => a.datum.localeCompare(b.datum));

  $('#kal-lijst').innerHTML = items.length ? items.map(i => `
    <div class="kaart" style="display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;gap:16px;align-items:center;min-width:240px">
        <div class="cat-bal" style="background:linear-gradient(155deg,var(--groen-d),#1A6438);border-radius:12px;width:auto;min-width:58px;padding:0 8px;flex-direction:column;font-size:13px;line-height:1.15">
          <span style="font-size:19px">${+i.datum.slice(8,10)}</span>${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][+i.datum.slice(5,7)-1]}
        </div>
        <div>
          <h3 style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${h(i.naam)} ${i.sjotter ? '<span class="badge b-live">op ' + CONFIG.PLATFORM + '</span>' : ''}</h3>
          <p class="sub">${h(i.plaats||'')}${i.cats ? ' · ' + h(i.cats) : ''}</p>
        </div>
      </div>
      ${i.link ? (i.sjotter
        ? `<a class="btn btn-p btn-sm" href="${h(i.link)}">Bekijk & schrijf in</a>`
        : `<a class="btn btn-o btn-sm" href="${h(/^https?:\/\//.test(i.link) ? i.link : 'https://' + i.link)}" target="_blank" rel="noopener">Website ↗</a>`) : ''}
    </div>`).join('') : '<div class="kaart"><div class="leeg">Nog geen aankomende toernooien in de kalender — voeg het eerste toe!</div></div>';
}

app.kalenderToevoegen = async () => {
  const v = id => $('#' + id).value.trim();
  if (!v('k-naam') || !v('k-club') || !v('k-datum') || !v('k-gemeente')) return toast('Vul de verplichte velden in (*)');
  const { error } = await sb.from('kalender').insert({
    naam: v('k-naam'), club: v('k-club'), datum: v('k-datum'), gemeente: v('k-gemeente'),
    provincie: $('#k-prov').value, categorieen: v('k-cats') || null, link: v('k-link') || null,
  });
  if (error) return fout(error);
  $('#k-melding').innerHTML = '<div class="melding m-ok">✓ Bedankt! Je toernooi wordt kort nagekeken en verschijnt daarna in de kalender.</div>';
  toast('Toernooi ingediend ✓');
};

/* ============================================================
   WACHTWOORD VERGETEN / RESETTEN
   ============================================================ */
function vWachtwoordVergeten(){
  root().innerHTML = topbar() + `<div class="wrap wrap-smal">
    <div class="kaart">
      <h3>Wachtwoord vergeten</h3>
      <p class="sub">Vul je e-mailadres in en we sturen je een herstellink.</p>
      <label>E-mailadres</label><input id="f-email" type="email" autocomplete="email">
      <div id="auth-melding"></div>
      <div style="margin-top:18px;display:flex;gap:10px;align-items:center">
        <button class="btn btn-p" onclick="app.wachtwoordReset()">Verstuur herstellink</button>
        <a href="#/login" style="font-size:13.5px">Terug naar aanmelden</a>
      </div>
    </div>
  </div>`;
}

app.wachtwoordReset = async () => {
  const email = $('#f-email').value.trim();
  if (!email) return toast('Vul je e-mailadres in');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + location.pathname
  });
  if (error) return fout(error);
  $('#auth-melding').innerHTML = `<div class="melding m-ok">✓ Als er een account bestaat voor <strong>${h(email)}</strong>, ontvang je binnen enkele minuten een e-mail met een herstellink.</div>`;
};

function vNieuwWachtwoord(){
  root().innerHTML = topbar() + `<div class="wrap wrap-smal">
    <div class="kaart">
      <h3>Nieuw wachtwoord instellen</h3>
      <label>Nieuw wachtwoord (min. 6 tekens)</label><input id="f-ww" type="password" autocomplete="new-password">
      <label>Herhaal nieuw wachtwoord</label><input id="f-ww2" type="password" autocomplete="new-password">
      <div id="auth-melding"></div>
      <button class="btn btn-p" style="margin-top:18px" onclick="app.nieuwWachtwoord()">Wachtwoord opslaan</button>
    </div>
  </div>`;
}

app.nieuwWachtwoord = async () => {
  const ww = $('#f-ww').value;
  if (ww.length < 6) return toast('Wachtwoord moet minstens 6 tekens zijn');
  if (ww !== $('#f-ww2').value) return toast('De wachtwoorden komen niet overeen');
  const { data, error } = await sb.auth.updateUser({ password: ww });
  if (error) return fout(error);
  sessie = (await sb.auth.getSession()).data.session;
  toast('Wachtwoord aangepast ✓');
  location.hash = '#/dashboard';
};

/* ============================================================
   PRIVACY & FOOTER

    © ${new Date().getFullYear()} ${CONFIG.PLATFORM} · <a href="#/toernooien">Toernooikalender</a> · <a href="#/help">Help & contact</a> · <a href="#/privacy">Privacyverklaring</a>
  </footer>`;
}

      ${V('Hoe werkt de loting en het speelschema?', 'Met \u00e9\u00e9n klik verdeelt de loting de ploegen over de poules, waarbij ploegen van dezelfde club uit elkaar gehouden worden. Daarna genereert het schema zich automatisch op basis van je velden, wedstrijdduur en pauzes \u2014 zonder dubbele boekingen. Alles blijft nadien manueel bij te sturen.')}

      ${V('Wat doen de scheidsrechterslinks?', 'Elke scheidsrechter krijgt een persoonlijke link waarop hij enkel zijn eigen wedstrijden ziet en zelf de scores kan ingeven. Die verschijnen meteen op de live standen en het TV-scherm.')}

        Op servers van Supabase in de Europese Unie (regio Frankfurt). Contactgegevens van ingeschreven ploegen zijn niet publiek zichtbaar en enkel toegankelijk voor de organisator van het betreffende toernooi.</p>

boot();
